# scenarios/32-script-injection-commit-message
# CICD-SEC-4 (Poisoned Pipeline Execution)
# Variant of scenario 02 — same canonical bug (template injection of
# attacker-controlled github.event.* into a run: block), different
# untrusted context: ${{ github.event.head_commit.message }}.
#
# A contributor with push access to ANY branch (e.g. via their own fork +
# PR) can craft a commit message containing shell metacharacters.  This
# is one of the most overlooked entries on the untrusted-input list
# because commit messages "look like text" — but they're interpolated
# verbatim into the generated shell script.
#
# Safety: every job is gated with `if: false`.
# See scenarios/32-script-injection-commit-message/README.md for details.

name: scenario-32-script-injection-commit-message

on:
  push:
    branches-ignore: [main]

permissions:
  contents: read

jobs:
  log-commit:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Log latest commit message (DANGER - direct interpolation)
        run: |
          echo "Latest commit: ${{ github.event.head_commit.message }}"
