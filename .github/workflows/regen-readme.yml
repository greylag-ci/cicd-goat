name: regen-readme

# Regenerates the README leaderboard + docs/MATRIX.md from
# tools/scenarios.yaml + the latest scanner-comparison SARIF.  Two triggers:
#
#   * workflow_dispatch — manual rerun on demand.
#   * schedule          — weekly nudge so the totals don't go stale.
#
# Output:
#   - If the regenerated README.md OR docs/MATRIX.md differs from main,
#     the workflow pushes a branch and surfaces the compare URL in the
#     summary for one-click PR creation.
#   - The verify step ALWAYS runs and reports drift (claimed rules vs.
#     actually-firing rules) to the workflow summary.  Drift does not
#     fail the workflow — it's intentional roadmap signal.

on:
  workflow_dispatch:
  schedule:
    - cron: '23 7 * * 1'

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  regen:
    name: regen + verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: true     # we push back from this job
          fetch-depth: 0
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
      - name: Install PyYAML
        run: pip install PyYAML==6.0.2
      - name: Fetch SARIF from latest scanner-comparison run
        run: |
          set -euo pipefail
          mkdir -p sarif
          # `.[0].databaseId` on an empty array emits the literal string
          # "null"; `// empty` makes the jq filter print nothing instead so
          # the `[ -z ]` guard below actually fires when no runs exist.
          run_id=$(gh run list \
            --repo "${{ github.repository }}" \
            --workflow scanner-comparison.yml \
            --branch main \
            --status success \
            --limit 1 \
            --json databaseId \
            --jq '.[0].databaseId // empty')
          if [ -z "${run_id}" ]; then
            echo "no successful scanner-comparison run on main — skipping" | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          echo "downloading SARIF from run ${run_id}" | tee -a "$GITHUB_STEP_SUMMARY"
          gh run download "${run_id}" --repo "${{ github.repository }}" --dir sarif
      - name: Verify scenarios.yaml against SARIF
        # Drift is informational, not fatal — it's the roadmap signal.
        continue-on-error: true
        run: |
          set -euo pipefail
          {
            echo '## Drift report (`scenarios.yaml` vs. latest SARIF)'
            echo
            echo '```'
            python tools/regen-readme.py --verify --sarif-dir sarif 2>&1 || true
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
      - name: Regenerate README sections
        # Skip when the fetch step found no successful scanner-comparison
        # run on main — running with an empty sarif/ would rewrite every
        # verdict to MISS and the push step would commit that corruption.
        if: hashFiles('sarif/**/*.sarif') != ''
        run: python tools/regen-readme.py --sarif-dir sarif
      - name: Push branch + surface PR URL
        # We deliberately don't call `gh pr create` — the repo setting
        # "Allow GitHub Actions to create and approve pull requests"
        # is off by default and we'd rather not require an admin
        # toggle.  Instead we push a timestamped branch and put the
        # "compare and create PR" URL in the workflow summary; one
        # click to open the PR.
        run: |
          set -euo pipefail
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          # All four files carry AUTOGEN markers; any can drift.
          # COVERAGE-AXES.md + RULE-FIRINGS.md were added in PR #15 and
          # previously omitted from the diff/add set — they sat stale on
          # main for several days before the bug review caught it.
          autogen_files=(README.md docs/MATRIX.md docs/COVERAGE-AXES.md docs/RULE-FIRINGS.md)
          if git diff --quiet -- "${autogen_files[@]}"; then
            echo "AUTOGEN files unchanged — nothing to commit." | tee -a "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          branch="auto/regen-readme-$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$branch"
          git add "${autogen_files[@]}"
          git commit -m "auto: regen README stats

          Regenerated by .github/workflows/regen-readme.yml from
          tools/scenarios.yaml + the latest scanner-comparison SARIF."
          git push origin "$branch"
          {
            echo
            echo "### README changed — open PR"
            echo
            echo "Branch: \`${branch}\`"
            echo
            echo "Open the PR: <https://github.com/${{ github.repository }}/compare/main...${branch}?expand=1>"
          } >> "$GITHUB_STEP_SUMMARY"
