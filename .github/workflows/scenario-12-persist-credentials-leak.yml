# scenarios-greylag/12-persist-credentials-leak
# CICD-SEC-6 (Insufficient Credential Hygiene) + CICD-SEC-3 (Dependency Chain Abuse)
# Pattern: actions/checkout's persist-credentials defaults to true, which
# writes a base64-encoded extraheader containing the GITHUB_TOKEN into
# .git/config on the runner.  A later step from an untrusted third-party
# action can read that file and exfiltrate the token.
#
# Safety: every job is gated with `if: false`.
# See scenarios-greylag/12-persist-credentials-leak/README.md for details.

name: scenario-12-persist-credentials-leak

on:
  pull_request:

permissions:
  contents: write

jobs:
  build:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        # DANGER: persist-credentials defaults to true; token lives in
        # .git/config for the remainder of the job.
      - name: Untrusted third-party step with implicit access to .git/config
        uses: third-party-org/some-build-action@main
      - run: |
          # Any step here could `cat .git/config` and exfiltrate the token.
          make build
