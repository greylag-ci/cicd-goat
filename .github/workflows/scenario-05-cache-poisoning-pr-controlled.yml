# scenarios-greylag/05-cache-poisoning-pr-controlled
# CICD-SEC-4 + CICD-SEC-9 (Improper Artifact Integrity Validation)
# Pattern: actions/cache key contains attacker-controllable PR metadata.  A
# malicious PR can poison the cache that subsequent main-branch CI restores,
# letting fork code execute under base-branch privileges.
#
# Safety: every job is gated with `if: false`.
# See scenarios-greylag/05-cache-poisoning-pr-controlled/README.md for details.

name: scenario-05-cache-poisoning-pr-controlled

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Restore/save deps using attacker-controllable key
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.npm
          # DANGER: key derived from PR title — any forker can craft a
          # collision against the main-branch key.
          key: deps-${{ runner.os }}-${{ github.event.pull_request.title || github.ref_name }}
          restore-keys: |
            deps-${{ runner.os }}-
      - run: npm ci && npm test
