# scenarios/02-script-injection-issue-title
# CICD-SEC-4 (Poisoned Pipeline Execution)
# Pattern: untrusted github.event.* expression interpolated into a `run:` block
# is evaluated by bash, giving anyone who can open an issue arbitrary shell
# execution on the runner.
#
# Safety: every job is gated with `if: false`.
# See scenarios/02-script-injection-issue-title/README.md for details.

name: scenario-02-script-injection-issue-title

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  greet:
    if: false
    runs-on: ubuntu-latest
    steps:
      - name: Echo issue title (DANGER - direct interpolation)
        run: |
          echo "New issue: ${{ github.event.issue.title }}"
      - name: Conditionally label (DANGER - body also interpolated)
        run: |
          BODY="${{ github.event.issue.body }}"
          if echo "$BODY" | grep -q "bug"; then
            echo "looks buggy"
          fi
