# scenarios-greylag/04-github-token-write-all
# CICD-SEC-5 (Insufficient PBAC) + least-privilege violation
# Pattern: workflow grants the auto-issued GITHUB_TOKEN write access to every
# scope.  Combined with any later vuln (script injection, untrusted action,
# checkout of fork head) this enables full repo takeover via the token alone.
#
# Safety: every job is gated with `if: false`.
# See scenarios-greylag/04-github-token-write-all/README.md for details.

name: scenario-04-github-token-write-all

on:
  pull_request:
  push:
    branches: [main]

# DANGER: every scope, every job, no need.
permissions: write-all

jobs:
  ci:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          echo "Running CI with write access to contents, packages, pages,"
          echo "deployments, issues, pull-requests, statuses, ..."
          npm ci
          npm test
