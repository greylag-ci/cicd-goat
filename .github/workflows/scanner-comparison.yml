name: scanner-comparison

# Runs multiple CI/CD-focused security scanners against the cicd-goat
# tree and uploads each result as a separate SARIF category to Code
# Scanning.  See README.md for the comparison story.
#
# SAFETY MODEL
# ------------
# This is the only workflow in the repo that actually runs.  Every
# `scenario-NN-*.yml` and `_reusable-deploy.yml` job is gated with
# `if: false` (enforced by .github/workflows/safety-check.yml).
#
# All action references below are pinned to immutable commit SHAs.
# All binaries downloaded by `curl` are verified against an inline
# SHA-256.  Permissions are the minimum each scanner needs.
#
# Tampering with this file MUST be reviewed against the
# scenario-comparison-pinning rule in CODEOWNERS / branch protection
# before it can land on main.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 7 * * 1'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline-check:
    name: pipeline-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
      - name: Install pipeline-check (verified)
        # Pinned to 1.5.0 + sha256 of the wheel from PyPI.  --no-deps
        # is intentional: pipeline-check's runtime deps (boto3, click,
        # PyYAML, rich) are installed in a separate, unhashed step
        # so we don't have to track the full transitive hash list.
        # The CLI doesn't execute attacker input from the scanned
        # tree, so its deps can be looser than the scanner itself.
        run: |
          set -euo pipefail
          pip install --require-hashes --no-deps -r /dev/stdin <<'REQ'
          pipeline-check==1.5.0 --hash=sha256:da9ed3e242ea213ce2df53e7d054258acce12fc6e8cc77607680d2ff77182625
          REQ
          pip install 'boto3' 'click' 'PyYAML' 'rich'
      - name: Run pipeline-check (all providers in the corpus)
        # pipeline-check is the only scanner here that reads every provider.
        # One invocation per provider, each pointed at the tree it owns:
        #   - github  : .github/workflows (the 38 gated GHA scenarios)
        #   - others  : scenarios/  (the per-provider path flag recurses and
        #               finds the nested fixtures, and emits the nested path in
        #               the SARIF URI so regen-readme.py can attribute it)
        # All SARIFs carry tool.driver.name = "pipeline_check", so
        # parse_sarif_dir merges them into one logical scanner in the matrix.
        # `|| [ $? -eq 1 ]` tolerates exit 1 (= findings present).
        run: |
          set -euo pipefail
          mkdir -p pc-sarif
          python -m pipeline_check --pipeline github    --gha-path .github/workflows   --output sarif > pc-sarif/pipeline-check-github.sarif    || [ $? -eq 1 ]
          python -m pipeline_check --pipeline gitlab    --gitlab-path scenarios        --output sarif > pc-sarif/pipeline-check-gitlab.sarif    || [ $? -eq 1 ]
          python -m pipeline_check --pipeline jenkins   --jenkinsfile-path scenarios   --output sarif > pc-sarif/pipeline-check-jenkins.sarif   || [ $? -eq 1 ]
          python -m pipeline_check --pipeline azure     --azure-path scenarios         --output sarif > pc-sarif/pipeline-check-azure.sarif     || [ $? -eq 1 ]
          python -m pipeline_check --pipeline circleci  --circleci-path scenarios      --output sarif > pc-sarif/pipeline-check-circleci.sarif  || [ $? -eq 1 ]
          python -m pipeline_check --pipeline bitbucket --bitbucket-path scenarios     --output sarif > pc-sarif/pipeline-check-bitbucket.sarif || [ $? -eq 1 ]
          python -m pipeline_check --pipeline drone     --drone-path scenarios         --output sarif > pc-sarif/pipeline-check-drone.sarif     || [ $? -eq 1 ]
          python -m pipeline_check --pipeline buildkite --buildkite-path scenarios     --output sarif > pc-sarif/pipeline-check-buildkite.sarif || [ $? -eq 1 ]
          python -m pipeline_check --pipeline cloudbuild --cloudbuild-path scenarios   --output sarif > pc-sarif/pipeline-check-cloudbuild.sarif || [ $? -eq 1 ]
          # npm: the package.json fixtures (scenarios 20 / 29) live under
          # scenarios/, not .github/workflows, so the github scan never sees
          # them. This dedicated npm scan parses them statically (it never runs
          # the install scripts) and emits scenarios/NN- URIs for attribution —
          # restoring NPM-001 (floating range) / NPM-004 (install lifecycle).
          python -m pipeline_check --pipeline npm       --npm-path scenarios         --output sarif > pc-sarif/pipeline-check-npm.sarif       || [ $? -eq 1 ]
          # Tekton + Argo: pipeline-check's discovery is single-manifest per
          # path AND it attaches some findings to a synthetic `resource:///`
          # URI rather than the file path. tools/pipeline-check-resource-scan.py
          # runs it per manifest and rewrites every finding's URI to the file
          # path so regen-readme.py can attribute it. Output lands in the
          # artifact (consumed by the matrix) under tool.driver.name=pipeline_check.
          # No `|| true`: the wrapper returns 0 whether or not findings exist,
          # and non-zero ONLY on a hard failure (pipeline-check missing/crashed)
          # — which must fail the job rather than silently drop all of
          # Tekton/Argo/Dockerfile/K8s/Helm from the matrix.
          python tools/pipeline-check-resource-scan.py \
            --output pc-sarif/pipeline-check-resource.sarif scenarios
      - name: Upload pipeline-check (github) SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: pc-sarif/pipeline-check-github.sarif
          category: pipeline-check
      - name: Upload pipeline-check (gitlab) SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: pc-sarif/pipeline-check-gitlab.sarif
          category: pipeline-check-gitlab
      - name: Upload pipeline-check (jenkins) SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: pc-sarif/pipeline-check-jenkins.sarif
          category: pipeline-check-jenkins
      - name: Upload pipeline-check (azure) SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: pc-sarif/pipeline-check-azure.sarif
          category: pipeline-check-azure
      - name: Upload pipeline-check (circleci) SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: pc-sarif/pipeline-check-circleci.sarif
          category: pipeline-check-circleci
      - name: Upload pipeline-check (bitbucket) SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: pc-sarif/pipeline-check-bitbucket.sarif
          category: pipeline-check-bitbucket
      - name: Upload pipeline-check (drone) SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: pc-sarif/pipeline-check-drone.sarif
          category: pipeline-check-drone
      - name: Upload pipeline-check (buildkite) SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: pc-sarif/pipeline-check-buildkite.sarif
          category: pipeline-check-buildkite
      - name: Upload pipeline-check (cloudbuild) SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: pc-sarif/pipeline-check-cloudbuild.sarif
          category: pipeline-check-cloudbuild
      - name: Upload pipeline-check (npm) SARIF
        uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: pc-sarif/pipeline-check-npm.sarif
          category: pipeline-check-npm
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: pipeline-check-sarif
          path: pc-sarif

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
      - name: Install zizmor (version-pinned)
        # Pinned to match this repo's "every tool/action pinned" safety
        # model (see SAFETY MODEL note at top of file). Unpinned
        # `pipx install zizmor` would silently shift the set of audits
        # the comparison runs against; bump deliberately when the
        # leaderboard drift is investigated and explained.
        run: pipx install zizmor==1.25.2
      - name: Run zizmor
        run: zizmor --format sarif . > zizmor.sarif || true
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        with:
          sarif_file: zizmor.sarif
          category: zizmor
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: zizmor-sarif
          path: zizmor.sarif

  poutine:
    name: poutine
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Run poutine
        uses: boostsecurityio/poutine-action@e240ebd3eff8b2db5a8e5f6b28f58739d7db2247  # v1.1.4
        with:
          format: sarif
          output: poutine.sarif
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: poutine.sarif
          category: poutine
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: poutine-sarif
          path: poutine.sarif

  checkov:
    name: checkov
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Run checkov
        uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898  # v12.3102.0
        with:
          directory: .
          output_format: sarif
          output_file_path: checkov-out
          soft_fail: true
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: checkov-out/results_sarif.sarif
          category: checkov
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: checkov-sarif
          path: checkov-out

  kics:
    name: kics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Run KICS via Docker (bypass action wrapper — upstream Chainguard outage)
        # The `checkmarx/kics-github-action` wrapper builds its own image at
        # runtime from a Dockerfile that references `cgr.dev/chainguard/wolfi-base`,
        # and Chainguard's registry has been returning HTTP 500 ("too many
        # connections") since around 2026-05-26 — both `:latest` and digest-pinned
        # references fail. The action's only value-add over the underlying scanner
        # is GHA-specific annotation formatting, which this comparison doesn't
        # use (we only consume the SARIF upload).
        #
        # Solution: invoke checkmarx/kics directly from Docker Hub (no Chainguard
        # dependency). The image is pinned by sha256 digest so the build is
        # reproducible. The kics CLI args mirror what the action wrapper sets
        # for the same `with:` inputs we previously used.
        #
        # KICS v2.1.20 emits `taxonomies[*].taxa` arrays with duplicate entries
        # (multiple identical CWE definitions), which violates the SARIF v2.1.0
        # schema (taxa must be unique). The official action wrapper runs a
        # node.js post-processor that dedupes these before upload. We do the
        # same in one jq filter — `unique` performs deep-equality dedup so
        # genuinely-distinct entries are preserved.
        run: |
          set -euo pipefail
          mkdir -p kics-results
          docker run --rm \
            -v "$PWD:/path:ro" \
            -v "$PWD/kics-results:/results" \
            checkmarx/kics:v2.1.20@sha256:3e5a268eb8adda2e5a483c9359ddfc4cd520ab856a7076dc0b1d8784a37e2602 \
            scan \
              --no-progress \
              --path /path \
              --output-path /results \
              --output-name results \
              --report-formats sarif \
              --ignore-on-exit results
          jq '.runs[].taxonomies |= (. // [] | map(.taxa |= unique))' \
            kics-results/results.sarif > kics-results/results.fixed.sarif
          mv kics-results/results.fixed.sarif kics-results/results.sarif
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: kics-results/results.sarif
          category: kics
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: kics-sarif
          path: kics-results

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Install actionlint (verified)
        # Pinned to 1.7.12 + the SHA-256 from the official
        # actionlint_1.7.12_checksums.txt file shipped with the release.
        # MIT-licensed; tarball download + checksum match this repo's
        # safety model (see SAFETY MODEL note at top of this file).
        run: |
          set -euo pipefail
          ACTIONLINT_VERSION=1.7.12
          ACTIONLINT_SHA256=8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
          curl -fsSL -o actionlint.tgz \
            "https://github.com/rhysd/actionlint/releases/download/v${ACTIONLINT_VERSION}/actionlint_${ACTIONLINT_VERSION}_linux_amd64.tar.gz"
          echo "${ACTIONLINT_SHA256}  actionlint.tgz" | sha256sum -c -
          tar -xzf actionlint.tgz actionlint
      - name: Run actionlint -> SARIF
        # actionlint has no native SARIF emitter; -format '{{json .}}'
        # produces a JSON array of findings, which tools/actionlint-to-sarif.py
        # wraps as a SARIF v2.1.0 run.
        #
        # actionlint's CLI takes file paths or globs (not directories) — with
        # no positional argument it auto-discovers .github/workflows/*.yml
        # from the working directory, which is what we want here.
        # Exit code 1 means findings present; `|| true` tolerates it.
        # tools/actionlint-to-sarif.py handles empty input gracefully (emits
        # SARIF with zero results), so a fatal actionlint failure surfaces as
        # ❌ verdicts in the matrix + drift in --verify, not a CI red mark.
        run: |
          ./actionlint -format '{{json .}}' > actionlint-findings.json || true
          python3 tools/actionlint-to-sarif.py \
            < actionlint-findings.json > actionlint.sarif
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: actionlint.sarif
          category: actionlint
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: actionlint-sarif
          path: actionlint.sarif

  octoscan:
    name: octoscan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Install octoscan (verified)
        # Pinned to v0.1.7 + an inline SHA-256 we computed from the
        # release binary on first integration.  The synacktiv release
        # doesn't ship a checksums file of its own — this commit fixes
        # the hash, so any upstream re-upload trips `sha256sum -c -`.
        # GPL-3.0; we invoke the binary, we don't redistribute its
        # source, so GPL terms attach to upstream, not to this repo.
        run: |
          set -euo pipefail
          OCTOSCAN_VERSION=0.1.7
          OCTOSCAN_SHA256=6435e9cc0e6346741367cbb1803e5b545d8e7031d188c733a0b30f768ab6ebe2
          curl -fsSL -o octoscan \
            "https://github.com/synacktiv/octoscan/releases/download/v${OCTOSCAN_VERSION}/octoscan"
          echo "${OCTOSCAN_SHA256}  octoscan" | sha256sum -c -
          chmod +x octoscan
      - name: Run octoscan
        # octoscan emits SARIF v2.1.0 natively (tool.driver.name = "octoscan").
        # Exit code 1 means findings present — let the SARIF upload tell the story.
        #
        # IMPORTANT: pass the repo ROOT (`.`), not `.github/workflows/`.
        # `octoscan scan <dir>` does WalkDir(<dir>) looking for
        # `<subdir>/.github/workflows/` subdirectories (it's designed to scan
        # multiple repos at once via the synacktiv `dl` workflow). Passing
        # the workflows dir directly causes octoscan to look for
        # `.github/workflows/.github/workflows/` which doesn't exist, so
        # zero scanning happens. With `.`, octoscan walks the repo and
        # finds `./.github/workflows/` exactly once.
        run: |
          ./octoscan scan --format sarif . > octoscan.sarif || true
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: octoscan.sarif
          category: octoscan
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: octoscan-sarif
          path: octoscan.sarif

  ciguard:
    name: ciguard
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
      - name: Install ciguard (verified)
        # Pinned to 0.11.2 + sha256 of the wheel from PyPI. --no-deps +
        # --require-hashes installs only the hash-verified ciguard wheel;
        # the runtime deps `scan --format sarif` actually needs (pydantic,
        # PyYAML, jinja2, reportlab — NOT the optional anthropic/openai/
        # fastapi/uvicorn that ciguard declares for its app/mcp features)
        # are installed unhashed in a second step, same pattern as the
        # pipeline-check job above.
        run: |
          set -euo pipefail
          pip install --require-hashes --no-deps -r /dev/stdin <<'REQ'
          ciguard==0.11.2 --hash=sha256:daed0a5c6fa6607a0db69b6b4c61fc7c903187f5e0156d89254dbab9d7ccd3b6
          REQ
          pip install pydantic PyYAML jinja2 reportlab
      - name: Run ciguard over nested provider fixtures
        # ciguard's native SARIF is single-file and writes only the file's
        # BASENAME as the artifact URI, which can't be attributed to a
        # scenario. tools/ciguard-scan-tree.py runs ciguard per discovered
        # GitLab/Jenkins fixture under scenarios/, rewrites each finding's
        # URI to the real nested path, and merges into one SARIF.
        # (ciguard's GitHub Actions ruleset is skipped — its Job.if model
        # rejects the `if: false` gate every GHA scenario carries.)
        run: python tools/ciguard-scan-tree.py --output ciguard.sarif scenarios
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: ciguard.sarif
          category: ciguard
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: ciguard-sarif
          path: ciguard.sarif

  summary:
    name: comparison-summary
    needs: [pipeline-check, zizmor, poutine, checkov, kics, actionlint, octoscan, ciguard]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: sarif
      - name: Aggregate finding counts
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '## Scanner finding counts'
            echo
            echo '| Scanner | Total findings | SARIF file |'
            echo '|---|---:|---|'
          } >> "$GITHUB_STEP_SUMMARY"
          shopt -s nullglob
          for dir in sarif/*/; do
            name="$(basename "$dir")"
            file="$(find "$dir" -name '*.sarif' -type f | head -n 1 || true)"
            count="-"
            if [ -n "$file" ] && [ -s "$file" ]; then
              count="$(jq '[.runs[]?.results[]?] | length' "$file" 2>/dev/null || echo "-")"
            fi
            printf '| %s | %s | `%s` |\n' "$name" "$count" "${file:-(none)}" >> "$GITHUB_STEP_SUMMARY"
          done
