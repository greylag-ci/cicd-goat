name: scanner-comparison

# Runs multiple CI/CD-focused security scanners against the cicd-goat
# tree and uploads each result as a separate SARIF category to Code
# Scanning.  See README.md for the comparison story.
#
# SAFETY MODEL
# ------------
# This is the only workflow in the repo that actually runs.  Every
# `scenario-NN-*.yml` and `_reusable-deploy.yml` job is gated with
# `if: false` (enforced by .github/workflows/safety-check.yml).
#
# All action references below are pinned to immutable commit SHAs.
# All binaries downloaded by `curl` are verified against an inline
# SHA-256.  Permissions are the minimum each scanner needs.
#
# Tampering with this file MUST be reviewed against the
# scenario-comparison-pinning rule in CODEOWNERS / branch protection
# before it can land on main.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '17 7 * * 1'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pipeline-check:
    name: pipeline-check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
      - name: Install pipeline-check (verified)
        # Pinned to 1.1.0 + sha256 of the wheel from PyPI.  --no-deps
        # is intentional: pipeline-check's runtime deps (boto3, click,
        # PyYAML, rich) are installed in a separate, unhashed step
        # so we don't have to track the full transitive hash list.
        # The CLI doesn't execute attacker input from the scanned
        # tree, so its deps can be looser than the scanner itself.
        run: |
          set -euo pipefail
          pip install --require-hashes --no-deps -r /dev/stdin <<'REQ'
          pipeline-check==1.1.0 --hash=sha256:9fa7ce91cd2603926c224ae83a976909156e0463d48a412a226c84b831fd6dc8
          REQ
          pip install 'boto3' 'click' 'PyYAML' 'rich'
      - name: Run pipeline-check
        run: |
          set -euo pipefail
          python -m pipeline_check \
            --pipeline github \
            --gha-path .github/workflows \
            --output sarif \
            > pipeline-check.sarif || [ $? -eq 1 ]
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: pipeline-check.sarif
          category: pipeline-check
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: pipeline-check-sarif
          path: pipeline-check.sarif

  zizmor:
    name: zizmor
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.12'
      - name: Install zizmor
        run: pipx install zizmor
      - name: Run zizmor
        run: zizmor --format sarif . > zizmor.sarif || true
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        with:
          sarif_file: zizmor.sarif
          category: zizmor
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        with:
          name: zizmor-sarif
          path: zizmor.sarif

  poutine:
    name: poutine
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Run poutine
        uses: boostsecurityio/poutine-action@e240ebd3eff8b2db5a8e5f6b28f58739d7db2247  # v1.1.4
        with:
          format: sarif
          output: poutine.sarif
        continue-on-error: true
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: poutine.sarif
          category: poutine
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: poutine-sarif
          path: poutine.sarif

  checkov:
    name: checkov
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Run checkov
        uses: bridgecrewio/checkov-action@4048c972aae68d0b983a48bb3479aab2d877b898  # v12.3102.0
        with:
          directory: .
          output_format: sarif
          output_file_path: checkov-out
          soft_fail: true
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: checkov-out/results_sarif.sarif
          category: checkov
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: checkov-sarif
          path: checkov-out

  kics:
    name: kics
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Run KICS
        uses: checkmarx/kics-github-action@05aa5eb70eede1355220f4ca5238d96b397e30a6  # v2.1.20
        with:
          path: '.'
          output_path: kics-results
          output_formats: 'sarif'
          ignore_on_exit: results
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: kics-results/results.sarif
          category: kics
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: kics-sarif
          path: kics-results

  trivy:
    name: trivy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          scan-type: config
          format: sarif
          output: trivy.sarif
          exit-code: '0'
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: trivy.sarif
          category: trivy
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: trivy-sarif
          path: trivy.sarif

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Install gitleaks (verified)
        env:
          GL_VERSION: 8.21.2
          GL_SHA256: 5bc41815076e6ed6ef8fbecc9d9b75bcae31f39029ceb55da08086315316e3ba
        run: |
          set -euo pipefail
          curl -fsSL -o gitleaks.tgz \
            "https://github.com/gitleaks/gitleaks/releases/download/v${GL_VERSION}/gitleaks_${GL_VERSION}_linux_x64.tar.gz"
          echo "${GL_SHA256}  gitleaks.tgz" | sha256sum -c -
          tar -xzf gitleaks.tgz gitleaks
          chmod +x gitleaks
      - name: Run gitleaks
        run: ./gitleaks detect --no-banner --report-format sarif --report-path gitleaks.sarif --exit-code 0
      - uses: github/codeql-action/upload-sarif@9e0d7b8d25671d64c341c19c0152d693099fb5ba  # v4
        if: always()
        with:
          sarif_file: gitleaks.sarif
          category: gitleaks
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02  # v4
        if: always()
        with:
          name: gitleaks-sarif
          path: gitleaks.sarif

  summary:
    name: comparison-summary
    needs: [zizmor, poutine, checkov, kics, trivy, gitleaks]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: sarif
      - name: Aggregate finding counts
        shell: bash
        run: |
          set -euo pipefail
          {
            echo '## Scanner finding counts'
            echo
            echo '| Scanner | Total findings | SARIF file |'
            echo '|---|---:|---|'
          } >> "$GITHUB_STEP_SUMMARY"
          shopt -s nullglob
          for dir in sarif/*/; do
            name="$(basename "$dir")"
            file="$(find "$dir" -name '*.sarif' -type f | head -n 1 || true)"
            count="-"
            if [ -n "$file" ] && [ -s "$file" ]; then
              count="$(jq '[.runs[]?.results[]?] | length' "$file" 2>/dev/null || echo "-")"
            fi
            printf '| %s | %s | `%s` |\n' "$name" "$count" "${file:-(none)}" >> "$GITHUB_STEP_SUMMARY"
          done
