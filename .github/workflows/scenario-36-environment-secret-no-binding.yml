# scenarios/36-environment-secret-no-binding
# CICD-SEC-5 (Insufficient Pipeline-Based Access Controls) + CICD-SEC-2
# (Inadequate Identity and Access Management)
# Pattern: an environment-protected secret is read in a job that binds
# `environment: production` (so required-reviewer + wait-timer + branch
# rules apply), then the secret value is passed to a downstream job
# via `needs.<job>.outputs.*`.  The downstream job has NO `environment:`
# binding of its own — so the secret is now accessible from a job that
# didn't go through the production environment's gates, defeating the
# scoping the protection was supposed to provide.
#
# Safety: every job is gated with `if: false`.
# See scenarios/36-environment-secret-no-binding/README.md for details.

name: scenario-36-environment-secret-no-binding

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  mint:
    if: false
    runs-on: ubuntu-latest
    # production is gated by required reviewers; this job waits.
    environment: production
    outputs:
      deploy_token: ${{ steps.mint.outputs.token }}
    steps:
      - name: Mint deploy token (uses env-protected secret)
        id: mint
        run: |
          # PROD_DEPLOY_TOKEN is configured on the `production`
          # environment.  Once the reviewer approves this job, the
          # secret is read here and emitted as a job output.
          echo "token=${{ secrets.PROD_DEPLOY_TOKEN }}" >> "$GITHUB_OUTPUT"

  deploy:
    if: false
    needs: mint
    runs-on: ubuntu-latest
    # DANGER: no `environment:` binding here.  The required-reviewer
    # gate fired ONCE on `mint`; this job runs whatever shell logic
    # it likes with the minted token — bypassing the production
    # environment's deployment-branches-rule, wait-timer, and any
    # custom protection rule that was supposed to also apply at the
    # deploy step.
    steps:
      - run: |
          curl -X POST https://api.example.com/deploy \
            -H "Authorization: Bearer ${{ needs.mint.outputs.deploy_token }}" \
            -d '{"env":"production"}'
