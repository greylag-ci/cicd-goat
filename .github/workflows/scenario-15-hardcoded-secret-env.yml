# scenarios/15-hardcoded-secret-env
# CICD-SEC-6 (Insufficient Credential Hygiene)
# Pattern: a secret pasted into the workflow source — visible to anyone
# who can read the repo, anyone who can read the cached workflow log,
# and anyone who can grep GitHub for tokens of that shape.
#
# Safety: every job is gated with `if: false`.  The token below is a
# fake test fixture that matches no real provider's signing format.
# See scenarios/15-hardcoded-secret-env/README.md for details.

name: scenario-15-hardcoded-secret-env

on:
  push:
    branches: [main]

permissions:
  contents: read

env:
  # DANGER: hardcoded credential in workflow source.  Fake token,
  # but matches a 40-char hex pattern that secret scanners detect.
  LEGACY_API_TOKEN: "deadbeefcafef00dfeedfacebadc0ffee0ddf00d"
  DB_PASSWORD: "P@ssw0rd-do-not-actually-do-this"

jobs:
  build:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: |
          curl -H "Authorization: Bearer $LEGACY_API_TOKEN" https://api.example.com/build
