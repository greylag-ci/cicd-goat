# scenarios/107-thirdparty-action-broad-secret
# CICD-SEC-8 (Ungoverned Usage of 3rd Party Services) · CICD-SEC-6
# Pattern: an org secret is published at WORKFLOW scope and handed to an
# unpinned, unverified third-party marketplace action. The secret is then
# readable by every step in every job (not just the one consumer), and the
# 3rd-party action — pinned to a mutable tag — can be swapped under the org
# at any time. Ungoverned trust in a 3rd-party service, with the blast
# radius of a long-lived deploy credential.
#
# Safety: the job is gated with `if: false`.
# See scenarios/107-thirdparty-action-broad-secret/README.md.

name: scenario-107-thirdparty-action-broad-secret

on:
  push:
    branches: [main]

# DANGER — workflow-scope secret: inherited by every job and every step,
# including any compromised/unpinned action below.
env:
  DEPLOY_API_KEY: ${{ secrets.DEPLOY_API_KEY }}

jobs:
  publish:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2
      # DANGER — unpinned third-party action (mutable @v2 tag, unverified
      # creator) receives the org's deploy key.
      - uses: acme-deploy/publish-action@v2
        with:
          api-key: ${{ env.DEPLOY_API_KEY }}
