# scenarios/27-secret-leak-in-logs
# CICD-SEC-10 (Insufficient Logging and Visibility)
# Pattern: secrets that should be masked end up in workflow logs because
# of `set -x`, URL-embedded credentials, or derived-from-secret values
# the GHA log filter doesn't recognize.  Public-repo workflow logs are
# world-readable, indexed by search engines, and downloadable as
# artifacts — a leak here is a permanent disclosure.
#
# Safety: every job is gated with `if: false`.
# See scenarios/27-secret-leak-in-logs/README.md for details.

name: scenario-27-secret-leak-in-logs

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  deploy:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Deploy (DANGER — three different ways the secret leaks)
        env:
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          # (1) set -x echoes every command verbatim.  GHA's secret
          # masking still works for exact matches, but partial values
          # or transformed values slip through.
          set -x

          # (2) Credential in URL query string — masking applies to
          # the exact secret value, but appended URL-encoded forms,
          # base64 wrappers, or anything that *contains* the secret
          # in a longer string can elude it.
          curl -fsS "https://api.example.com/deploy?key=${API_KEY}"

          # (3) Derived value — GHA only masks the secret as it was
          # registered.  A SHA256 of the secret, or its base64, or
          # the first 8 chars, is NOT masked.
          partial="${API_KEY:0:8}"
          echo "deploying with key prefix ${partial}..."
          fingerprint=$(printf '%s' "$API_KEY" | sha256sum | cut -c1-12)
          echo "key fingerprint: ${fingerprint}"
