# scenarios-greylag/06-reusable-secrets-inherit
# CICD-SEC-5 (Insufficient PBAC) + CICD-SEC-6 (Insufficient Credential Hygiene)
# Pattern: caller workflow invokes a reusable workflow with `secrets: inherit`,
# passing all org/repo secrets to the callee.  When the trigger is a
# pull_request from a fork, the callee runs with the caller's secrets even
# though the called workflow operates on untrusted code.
#
# Safety: every job is gated with `if: false`.
# See scenarios-greylag/06-reusable-secrets-inherit/README.md for details.

name: scenario-06-reusable-secrets-inherit

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  call-deploy:
    if: false
    # DANGER: passing every secret through to a reusable workflow that
    # ultimately handles untrusted PR contents.
    uses: ./.github/workflows/_reusable-deploy.yml
    secrets: inherit
    with:
      target: staging
