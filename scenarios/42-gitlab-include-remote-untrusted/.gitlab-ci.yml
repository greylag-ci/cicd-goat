# scenarios/42-gitlab-include-remote-untrusted
# CICD-SEC-3 (Dependency Chain Abuse) · CICD-SEC-9 (Improper Artifact Integrity)
#
# Pattern: `include:` pulls pipeline configuration that runs with FULL pipeline
# privileges from sources you don't control or can't pin:
#   * a `remote:` URL — GitLab fetches and merges third-party YAML it cannot
#     verify; whoever controls that host injects jobs and steals your secrets.
#   * a `project:` include pinned to a MUTABLE ref (`main`) — whoever can push
#     to that branch (or moves the tag) injects jobs on your next run.
# This is the GitLab analogue of the tj-actions mutable-ref class (scenario 03)
# and the March-2026 CI supply-chain incidents GitLab analysed.
#
# SAFETY: static fixture, nested under scenarios/ (never auto-run); the
# `workflow: rules: when: never` gate is belt-and-suspenders. See README.md.

include:
  # DANGER — remote include over the network, unpinned and unverifiable.
  - remote: 'https://templates.example.com/ci/build.yml'
  # DANGER — project include on a mutable branch instead of a commit SHA / tag.
  - project: 'platform/ci-templates'
    ref: main
    file: '/deploy.yml'

workflow:
  rules:
    - when: never

stages: [noop]

placeholder:
  stage: noop
  image: alpine@sha256:beefdbd8a1da6d2915566fde36db9db0b524eb737fc57cd1367effd16dc0d06d
  script:
    - echo "the danger is the include: block above, not this job"
