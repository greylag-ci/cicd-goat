# scenarios/81-cloudbuild-image-unpinned
# CICD-SEC-3 (Dependency Chain Abuse) · CICD-SEC-9 (Improper Artifact Integrity)
#
# Pattern: a Google Cloud Build step `name:` (the step image) pinned to a
# mutable tag / floating builder rather than a digest. The step runs inside
# whatever that reference resolves to; whoever moves the tag controls the build.
# Cloud Build analogue of scenarios 09 / 46 / 58 / 73 / 78.
#
# SAFETY: static fixture, nested under scenarios/ — Cloud Build only runs a
# config a trigger explicitly points at, never a nested file. See README.md.

steps:
  # DANGER — builder image referenced by mutable tag, not a digest.
  - name: 'gcr.io/cloud-builders/docker:latest'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/app', '.']
  - name: 'node:20'
    entrypoint: 'bash'
    args: ['-c', 'npm ci && npm run build']
