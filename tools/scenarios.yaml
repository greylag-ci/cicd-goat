  # Signed-but-not-bound: a hard case for the current field. No scanner in the comparison ships a rule that distinguishes `cosign verify` with `--certificate-identity*` + `--certificate-oidc-issuer` from one without. Target for next-gen rules; matches the #10 / #22 / #19 shape.
