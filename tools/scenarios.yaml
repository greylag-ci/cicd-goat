  # KICS / Checkov / octoscan all ship rules for ACTIONS_ALLOW_UNSECURE_COMMANDS=true — this is the only scenario in the corpus that exercises them. Project Zero bug 2070 was the disclosing vulnerability. Workflow shape matters: KICS's rule does a strict `env == true` Rego comparison (YAML bool, not string), and Checkov's CKV_GHA_1 only inspects `('jobs', 'jobs.*.steps[]')` — so the env block must be on the job (or step), and the value must be unquoted YAML `true`.  Pipeline-check fires its own rule for this anti-pattern; the rule ID will surface via the first post-merge regen.
