# Single source of truth for the README matrix and scenarios index.
# Edit this file -> run tools/regen-readme.py -> README sections between
# the BEGIN/END markers are rewritten.
#
# Schema:
#   scanners: ordered list of scanner entries (column order in the matrix)
#     id          : key used in scenarios[].expected
#     sarif_tool  : value of run.tool.driver.name in the scanner's SARIF
#                   (used by --verify mode and the regen of totals)
#     label       : column header in the matrix (may include HTML entities)
#
#   scenarios: ordered list (row order in the matrix)
#     id          : integer (1..N)
#     title       : markdown short title for the matrix
#     cicd_sec    : list of OWASP CICD-SEC category numbers
#     severity    : one of critical | high | medium | low
#     expected    : per-scanner expected canonical rule IDs.  Verdict
#                   is derived as:
#                     na      -> "—"  (not applicable to this class)
#                     []      -> "❌"  (no rule expected; bug not catchable)
#                     [list]  -> all fire ✅ ; some fire ⚠️ ; none fire ❌

scanners:
  - {id: pipeline-check, sarif_tool: pipeline_check, label: "pipeline&#x2011;check"}
  - {id: zizmor,         sarif_tool: zizmor,         label: zizmor}
  - {id: poutine,        sarif_tool: poutine,        label: poutine}
  - {id: kics,           sarif_tool: KICS,           label: KICS}
  - {id: checkov,        sarif_tool: Checkov,        label: Checkov}

scenarios:
  - {id: 1,  title: "`pull_request_target` + fork-head checkout",    cicd_sec: [4, 5], severity: critical, slug: 01-prtarget-checkout-head,                  expected: {pipeline-check: [GHA-002, GHA-044], zizmor: [zizmor/dangerous-triggers], poutine: [untrusted_checkout_exec], kics: [], checkov: []}}
  - {id: 2,  title: "Script injection via issue title",              cicd_sec: [4],    severity: high,     slug: 02-script-injection-issue-title,            expected: {pipeline-check: [GHA-003], zizmor: [zizmor/template-injection], poutine: [injection], kics: [20f14e1a-a899-4e79-9f09-b6a84cd4649b], checkov: [CKV_GHA_2]}}
  - {id: 3,  title: "Action pinned to mutable ref",                  cicd_sec: [3],    severity: high,     slug: 03-action-mutable-ref,                      expected: {pipeline-check: [GHA-001], zizmor: [zizmor/unpinned-uses], poutine: [github_action_from_unverified_creator_used], kics: [555ab8f9-2001-455e-a077-f2d0f41e2fb9], checkov: []}}
  - {id: 4,  title: "`GITHUB_TOKEN` `write-all`",                    cicd_sec: [5],    severity: medium,   slug: 04-github-token-write-all,                  expected: {pipeline-check: [GHA-004], zizmor: [zizmor/excessive-permissions], poutine: [], kics: [], checkov: [CKV2_GHA_1]}}
  - {id: 5,  title: "Cache poisoning via PR title",                  cicd_sec: [4, 9], severity: high,     slug: 05-cache-poisoning-pr-controlled,           expected: {pipeline-check: [GHA-011, GHA-052], zizmor: [zizmor/cache-poisoning], poutine: [], kics: [], checkov: []}}
  - {id: 6,  title: "Reusable workflow `secrets: inherit`",          cicd_sec: [5, 6], severity: medium,   slug: 06-reusable-secrets-inherit,                expected: {pipeline-check: [GHA-034], zizmor: [zizmor/secrets-inherit], poutine: [], kics: [], checkov: []}}
  - {id: 7,  title: "`workflow_run` artifact RCE",                   cicd_sec: [4, 9], severity: critical, slug: 07-workflow-run-artifact-rce,               expected: {pipeline-check: [GHA-009, GHA-032], zizmor: [zizmor/dangerous-triggers], poutine: [known_vulnerability_in_build_component], kics: [], checkov: []}}
  - {id: 8,  title: "Self-hosted runner on public repo",             cicd_sec: [7],    severity: critical, slug: 08-self-hosted-public-fork,                 expected: {pipeline-check: [GHA-012], zizmor: [zizmor/self-hosted-runner], poutine: [pr_runs_on_self_hosted], kics: [], checkov: []}}
  - {id: 9,  title: "Container image `:latest`",                     cicd_sec: [3, 9], severity: medium,   slug: 09-container-image-latest,                  expected: {pipeline-check: [GHA-051], zizmor: [zizmor/unpinned-images], poutine: [], kics: [], checkov: []}}
  # pipeline-check: GHA-030 fires on workflows that request id-token: write WITHOUT an environment binding; this scenario's workflow does bind `environment: production`, so GHA-030 correctly stays silent. The vulnerability lives in the sibling trust-policy.json (`repo:*` wildcard sub). GHA-062 walks the workflow's repo for trust-policy*.json files and flags broad subject claims directly.
  - {id: 10, title: "AWS OIDC wildcard `sub`",                       cicd_sec: [2, 7], severity: critical, slug: 10-oidc-aws-wildcard-sub,                   expected: {pipeline-check: [GHA-062], zizmor: [], poutine: [], kics: [], checkov: []}}
  - {id: 11, title: "`pip install` no hashes",                       cicd_sec: [3],    severity: medium,   slug: 11-pip-install-no-hashes,                   expected: {pipeline-check: [GHA-060], zizmor: na, poutine: [], kics: [], checkov: []}}
  - {id: 12, title: "`persist-credentials` leak",                    cicd_sec: [6, 3], severity: high,     slug: 12-persist-credentials-leak,                expected: {pipeline-check: [GHA-037], zizmor: [zizmor/artipacked], poutine: [github_action_from_unverified_creator_used], kics: [555ab8f9-2001-455e-a077-f2d0f41e2fb9], checkov: []}}
  - {id: 13, title: "`workflow_dispatch` input injection",           cicd_sec: [4],    severity: high,     slug: 13-input-injection-workflow-dispatch,       expected: {pipeline-check: [GHA-003], zizmor: [zizmor/template-injection], poutine: [], kics: [], checkov: [CKV_GHA_7]}}
  - {id: 14, title: "`$GITHUB_ENV` poisoning",                       cicd_sec: [4],    severity: high,     slug: 14-env-injection-pr-body,                   expected: {pipeline-check: [GHA-003], zizmor: [zizmor/template-injection], poutine: [injection], kics: [], checkov: [CKV_GHA_2]}}
  # pipeline-check: GHA-033 demoted — scenario's curl GET with `Authorization: Bearer $LEGACY_API_TOKEN` leaks the literal credential to the network, not to the workflow log (no `set -x`, no `echo $TOKEN`). GHA-008 catches the literal credential in YAML; GHA-033's carve-out for inline curl headers without shell trace stands.
  - {id: 15, title: "Hardcoded secret in `env:`",                    cicd_sec: [6],    severity: high,     slug: 15-hardcoded-secret-env,                    expected: {pipeline-check: [GHA-008], zizmor: [], poutine: [], kics: [487f4be7-3fd9-4506-a07a-eae252180c08, baee238e-1921-4801-9c3f-79ae1d7b2cbc], checkov: []}}
  - {id: 16, title: "`curl \\| sh` install",                         cicd_sec: [3],    severity: medium,   slug: 16-curl-pipe-sh,                            expected: {pipeline-check: [GHA-016], zizmor: [zizmor/unverified-script-download], poutine: [unverified_script_exec], kics: [], checkov: []}}
  - {id: 17, title: "ArtiPACKED — `.git/` in artifact",              cicd_sec: [6, 9], severity: critical, slug: 17-artipacked-git-dir,                      expected: {pipeline-check: [GHA-037, GHA-019], zizmor: [zizmor/artipacked], poutine: [], kics: [], checkov: []}}
  - {id: 18, title: "Composite action `${{ inputs.* }}` injection",  cicd_sec: [4],    severity: high,     slug: 18-composite-action-input-injection,        expected: {pipeline-check: [], zizmor: [], poutine: [], kics: [], checkov: []}}
  # pipeline-check: GHA-018 demoted — scenario fetches a binary from a third-party host over HTTPS, not an insecure package source (HTTP registry, --trusted-host). GHA-018 covers the latter; GHA-016 grew a "trusted-installer (Codecov 2021)" shape that catches the actual scenario (fetch + execute, no provenance attestation).
  - {id: 19, title: "Codecov-style trusted-installer",               cicd_sec: [3, 9], severity: critical, slug: 19-codecov-style-installer,                 expected: {pipeline-check: [GHA-016], zizmor: [], poutine: [], kics: [], checkov: []}}
  # pipeline-check: GHA-021/022/029 demoted — the scenario uses `npm ci` (lockfile-enforced) so those GHA-side rules correctly don't fire. The vulnerability lives in the sibling package.json (unscoped `@acme-internal/*` deps). Pipeline-check catches that via the npm provider (NPM-001 floating range; NPM-004 install lifecycle script); the GHA scanner emits a `[hint]` nudging users to add `--pipeline npm --npm-path scenarios/20-dependency-confusion`. Scanner-comparison CI needs the parallel `--pipeline npm` invocation before this row will flip ✅.
  - {id: 20, title: "Dependency confusion (Birsan)",                 cicd_sec: [3],    severity: critical, slug: 20-dependency-confusion,                    expected: {pipeline-check: [NPM-001, NPM-004], zizmor: [], poutine: [], kics: [], checkov: []}}
  # pipeline-check: GHA-003 demoted — scenario's producer step writes `echo "targets=$LABELS"` (defensively quoted; GHA-003 deliberately treats this as a safe shell idiom), and the consumer interpolates `${{ matrix.target }}` which isn't an untrusted context literal on its own. The matrix-expansion attack lives entirely in the cross-job/cross-axis flow that TAINT-002 traces end-to-end (env-binding -> step output -> job output -> fromJSON -> matrix axis -> sink), shipped in the post-1.2.0 cycle.
  - {id: 21, title: "Matrix expansion injection",                    cicd_sec: [4],    severity: high,     slug: 21-matrix-expansion-injection,              expected: {pipeline-check: [TAINT-002], zizmor: [zizmor/template-injection], poutine: [], kics: [], checkov: []}}
  # pipeline-check: same shape as scenario 10 on the GCP WIF side. The workflow correctly binds `environment: production` so GHA-030 doesn't fire; the over-broad `attribute.repository.startsWith('greylag-ci/')` lives in workload-identity-pool.tf and is caught by GHA-062's Terraform WIF leg.
  - {id: 22, title: "GCP OIDC over-broad WIF",                       cicd_sec: [2, 7], severity: critical, slug: 22-gcp-oidc-broad-wif,                      expected: {pipeline-check: [GHA-062], zizmor: [], poutine: [], kics: [], checkov: []}}
  # pipeline-check: GHA-019 demoted — scenario doesn't write GITHUB_TOKEN to persistent storage. `actions/checkout` leaves the token in .git/config via persist-credentials default-true, but the scenario doesn't upload that as an artifact (no ArtiPACKED shape). GHA-049 grew an `actions-bot-bypass` shape that pairs `git config user.name "github-actions[bot]"` with any `git push` in the same job — the canonical bypass-allowlist abuse primitive. (The full SCM-side branch-protection-allowlist audit lives in SCM-018 / SCM-019, run via `--scm-platform github`.)
  - {id: 23, title: "`github-actions[bot]` branch-protection bypass", cicd_sec: [1],   severity: high,     slug: 23-actions-bot-branch-protection-bypass,    expected: {pipeline-check: [GHA-049], zizmor: [], poutine: [], kics: [], checkov: []}}
  - {id: 24, title: "Third-party webhook exfiltration",              cicd_sec: [8],    severity: high,     slug: 24-third-party-webhook-exfil,               expected: {pipeline-check: [GHA-057], zizmor: [], poutine: [], kics: [], checkov: []}}
  - {id: 25, title: "Environment branch-pattern bypass",             cicd_sec: [1, 5], severity: high,     slug: 25-environment-branch-pattern-bypass,       expected: {pipeline-check: [], zizmor: [], poutine: [], kics: [], checkov: []}}
  - {id: 26, title: "GitHub App token over-scope",                   cicd_sec: [5],    severity: medium,   slug: 26-app-token-over-scope,                    expected: {pipeline-check: [GHA-061], zizmor: [zizmor/github-app], poutine: [], kics: [], checkov: []}}
  # pipeline-check: GHA-019 demoted — scenario leaks a secret to the workflow log via `set -x` shell trace, not to persistent storage. GHA-019 fires on `GITHUB_TOKEN` written to files / $GITHUB_ENV / artifacts; GHA-033 covers the log-side leak (the shell-trace shape was added for this scenario).
  - {id: 27, title: "Secret leak in workflow logs",                  cicd_sec: [10],   severity: high,     slug: 27-secret-leak-in-logs,                     expected: {pipeline-check: [GHA-033], zizmor: [], poutine: [], kics: [], checkov: []}}
  # pipeline-check: GHA-003 fires on the reusable workflow's `${{ inputs.build-args }}` interpolated into a `run:` block (same template-injection shape as scenarios 13 / 14 / 18). The cross-`workflow_call`-boundary attribution to the caller's `github.event.pull_request.body` source is the open question — TAINT-003 (cross-file taint via workflow_call inputs) is the candidate post-1.2 rule that promotes this from ⚠️ (sink-side only) to ✅ (full source→sink).
  - {id: 28, title: "Reusable workflow `${{ inputs.* }}` injection", cicd_sec: [4],    severity: high,     slug: 28-reusable-workflow-input-injection,       expected: {pipeline-check: [GHA-003], zizmor: [zizmor/template-injection], poutine: [], kics: [], checkov: []}}
  # pipeline-check: same shape as scenario 20 on the npm side. NPM-004 (install lifecycle script declared) fires when the npm provider walks `package.json`. The GHA scanner emits a `[hint]` nudging users to add `--pipeline npm --npm-path scenarios/29-npm-lifecycle-script-rce`; scanner-comparison CI needs the parallel invocation before this row will flip ✅. A workflow-only signal that *could* still fire from the GHA side is "npm install / npm ci without --ignore-scripts" — captured under GHA-022 in the post-1.2 cycle.
  - {id: 29, title: "npm lifecycle-script RCE",                      cicd_sec: [3],    severity: critical, slug: 29-npm-lifecycle-script-rce,                expected: {pipeline-check: [NPM-004], zizmor: [], poutine: [], kics: [], checkov: []}}
