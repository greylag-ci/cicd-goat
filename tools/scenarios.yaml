  # Cross-job environment-secret leak via needs.<>.outputs.* — the `mint` job binds `environment: production` and gets the protection-rule gate; the `deploy` job consumes the secret with no binding of its own. Requires cross-job dataflow analysis no scanner here currently carries.
  - {id: 36, title: "Environment secret read without consumer binding", cicd_sec: [5, 2], severity: high,  slug: 36-environment-secret-no-binding,           expected: {pipeline-check: [], zizmor: [], poutine: [], kics: [], checkov: [], actionlint: [], octoscan: []}}
  # poutine: confused_deputy_auto_merge demoted — the rule (opa/rego/rules/confused_deputy_auto_merge.rego) regex-matches `job["if"]` for `github.(actor|triggering_actor) == 'dependabot[bot]'` (and renovate / github-actions / dependabot-preview variants). This corpus gates every scenario job with literal `if: false` per the SAFETY MODEL — making the unsafe pattern textually invisible to any scanner that inspects `if:`. The bot-actor check survives as a comment for human readers (see the workflow file's safety note) but is no longer in the YAML AST. There's no clean workaround that preserves the if:-false safety invariant AND triggers if:-condition-based rules.
  - {id: 37, title: "Confused-deputy auto-merge via bot-identity gate", cicd_sec: [1],  severity: high,    slug: 37-confused-deputy-auto-merge,              expected: {pipeline-check: [], zizmor: [], poutine: [], kics: [], checkov: [], actionlint: [], octoscan: []}}
