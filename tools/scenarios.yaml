# Single source of truth for the README matrix and scenarios index.
# Edit this file -> run tools/regen-readme.py -> README sections between
# the BEGIN/END markers are rewritten.
#
# Schema:
#   scanners: ordered list of scanner entries (column order in the matrix)
#     id          : key used in scenarios[].expected
#     sarif_tool  : value of run.tool.driver.name in the scanner's SARIF
#                   (used by --verify mode and the regen of totals)
#     label       : column header in the matrix (may include HTML entities)
#     providers   : list of CI/CD providers this scanner can statically
#                   scan.  A (scenario, scanner) cell where the scenario's
#                   `provider` is NOT in this list renders "—" (na) and is
#                   excluded from the scanner's denominator — the scanner
#                   was never built to read that provider's files, so it
#                   is structurally not-applicable, not a miss.  This is
#                   what keeps GHA-only scanners (zizmor, KICS, actionlint,
#                   octoscan) from being penalised on GitLab/Jenkins/...
#                   rows they can't parse.
#
#   scenarios: ordered list (row order in the matrix)
#     id          : integer (1..N)
#     title       : markdown short title for the matrix
#     provider    : CI/CD provider this scenario targets.  Optional;
#                   defaults to `github` when omitted (the original 38
#                   GHA scenarios).  One of: github | gitlab | azure |
#                   circleci | bitbucket | jenkins | tekton | argo |
#                   drone | buildkite | cloudbuild.  Drives which scanner
#                   columns apply (see scanners[].providers) and which
#                   per-provider leaderboard / matrix the row lands in.
#     cicd_sec    : list of OWASP CICD-SEC category numbers
#     severity    : one of critical | high | medium | low
#     expected    : per-scanner expected canonical rule IDs.  Only fill in
#                   entries for scanners whose `providers` includes this
#                   scenario's provider; the rest auto-resolve to na.
#                   Verdict is derived as:
#                     na      -> "—"  (not applicable to this class)
#                     []      -> "❌"  (no rule expected; bug not catchable)
#                     [list]  -> all fire ✅ ; some fire ⚠️ ; none fire ❌

# `providers` capability per scanner is grounded in the Wave-0 research
# spike (see docs / commit history):
#   - pipeline-check : broadest coverage — every provider in the corpus.
#   - checkov        : GHA + gitlab_ci / azure_pipelines / circleci /
#                      bitbucket_pipelines / argo frameworks.
#   - poutine        : GHA today; gitlab / azure / tekton support exists
#                      upstream but its nested-file discovery + SARIF path
#                      attribution is unconfirmed on this corpus, so it is
#                      scoped to [github] until the spike flips it.
#   - ciguard        : gitlab + jenkins (declarative). ciguard *has* a
#                      GitHub Actions ruleset, but its pydantic `Job.if`
#                      model rejects a YAML boolean `if: false` — exactly
#                      the safety gate every GHA scenario here carries — so
#                      it errors out on this corpus's GHA files and is
#                      scoped to the providers it can actually parse.
#   - zizmor / actionlint / octoscan : GitHub Actions only.
#
# IaC / manifest types (scenarios 94+): the artifacts pipelines build/deploy.
# These are where the IaC scanners shine, so their `providers` lists expand:
#   - checkov        : + dockerfile / kubernetes / terraform / cloudformation / helm
#   - kics           : + dockerfile / kubernetes / terraform / cloudformation
#                      (KICS is fundamentally an IaC scanner; on CI/CD pipelines
#                      it only does GitHub workflows, hence github-only above —
#                      but it scores the IaC manifest types here).
#   - pipeline-check : + dockerfile / kubernetes / helm (rich DF-/K8S-/HELM-
#                      rules). NOT terraform (its TF provider needs a plan JSON,
#                      not raw .tf) or cloudformation (thin/non-attributable).
scanners:
  - {id: pipeline-check, sarif_tool: pipeline_check, label: "pipeline&#x2011;check", providers: [github, gitlab, azure, circleci, bitbucket, jenkins, tekton, argo, drone, buildkite, cloudbuild, dockerfile, kubernetes, helm]}
  - {id: zizmor,         sarif_tool: zizmor,         label: zizmor,                  providers: [github]}
  - {id: poutine,        sarif_tool: poutine,        label: poutine,                 providers: [github]}
  - {id: kics,           sarif_tool: KICS,           label: KICS,                    providers: [github, dockerfile, kubernetes, terraform, cloudformation]}
  - {id: checkov,        sarif_tool: Checkov,        label: Checkov,                 providers: [github, gitlab, azure, circleci, bitbucket, argo, dockerfile, kubernetes, terraform, cloudformation, helm]}
  - {id: actionlint,     sarif_tool: actionlint,     label: actionlint,              providers: [github]}
  - {id: octoscan,       sarif_tool: octoscan,       label: octoscan,                providers: [github]}
  - {id: ciguard,        sarif_tool: ciguard,        label: ciguard,                 providers: [gitlab, jenkins]}

