  # Checkov's gitlab_ci ruleset has no $CI_* injection check (0 findings ->
  # []), and ciguard emits only hygiene/missing-control findings on this
  # file, none naming the injection ([]).
  - {id: 39, title: "GitLab CI: script injection via `$CI_*` / MR vars", provider: gitlab,  cicd_sec: [4], severity: high, slug: 39-gitlab-ci-script-injection, expected: {pipeline-check: [GL-002], checkov: [], ciguard: []}}
  # Jenkins analogue: a `sh "...${untrusted}..."` step uses a double-quoted
  # Groovy GString, so attacker-controlled values (branch/PR name, params)
  # are expanded as shell *syntax* before the shell runs. Reliable detection
  # really wants Groovy AST; regex scanners catch the obvious double-quote
  # shape. Only pipeline-check + ciguard read Jenkinsfiles here. pipeline-check
  # catches it (JF-002, ScriptStepInterpolatesAttackerControllableEnvVar);
  # ciguard fires only agent/hygiene rules on this file, none naming the
  # interpolation sink ([]).
  - {id: 40, title: "Jenkins: `sh` string-interpolation injection",      provider: jenkins, cicd_sec: [4], severity: high, slug: 40-jenkins-shell-injection,   expected: {pipeline-check: [JF-002], ciguard: []}}

